<!DOCTYPE html>
<html lang="id">
<head><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">
    <span class="gradient-text">Library Control</span>
</div>
    <button onclick="logout()">Logout</button>
</div>

<!-- SIDEBAR + CONTENT -->
<div class="layout">
    
    <div class="content">

        <!-- MENU TOP -->
        <div class="menu-top">
            <button onclick="showAddBook()"> Tambah Buku</button>
            <button onclick="showBookList()"> Daftar Buku</button>
        </div>

    
    <div class="stats">

 <div class="stat-card">
    <div class="stat-icon">📚</div>

    <div class="stat-info">
        <h2 id="totalBooks">0</h2>
        <p>Total Buku</p>
    </div>
</div>

   <div class="stat-card">
    <div class="stat-icon">📅</div>

    <div class="stat-info">
        <h2 id="todayBooks">0</h2>
        <p>Buku Hari Ini</p>
    </div>
</div>

</div>

<!-- CONTENT -->
<div class="container">

<input type="text" id="searchInput" placeholder="🔎 Cari Buku..." onkeyup="searchBook()">
    
<div id="bookForm">

    <h3>Tambah Buku</h3>

    <input type="text" id="bookTitle" placeholder="Judul Buku">
    <input type="text" id="bookAuthor" placeholder="Penulis">

    <input type="text" id="bookImage" placeholder="Link Gambar Buku">

    <button onclick="addBook()">Tambah Buku</button>

</div>

<!-- LOADING -->
<div id="loading" style="display:none;">⏳ Menyimpan...</div>

<div class="book-list" id="bookList"></div>

</div>
</div>

<script src="app.js"></script>

<script>
document.addEventListener("DOMContentLoaded", loadBooks);
</script>

</body>
</html>
